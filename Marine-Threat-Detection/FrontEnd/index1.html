<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Your Website With Background Video</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Add CSS styles for loading animation */
        /* Updated CSS styles for loading animation with a white background */
        .loading-animation {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 1); /* White background */
            text-align: center;
            z-index: 9999;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="banner">
        <video autoplay loop muted playsinline>
            <source src="video (2160p).mp4" type="video/mp4">
        </video>
        <div class="navbar">
            <img class="logo" src="image.png">
            <ul>
                <li><a href="#">Jainam</a></li>
                <li><a href="#">Kashyap</a></li>
                <li><a href="#">Jay</a></li>
                <li><a href="#">Pratham</a></li>
            </ul>
        </div>
        <div class="content">
            <h1>Marine Threat Surveillance</h1>
            <div>
                <a href="learnmore.html" id="learn-more-link"><button type="button">Learn More</button></a>
            </div>
        </div>
    </div>
    <div class="loading-animation" id="loading-animation">
        <div class="loading-spinner">
            <img src="preloaderfish.gif" alt="Loading...">
        </div>
    </div>
    <script>
        // Add JavaScript to handle the loading animation
        const learnMoreButton = document.getElementById('learn-more-link');
        const loadingAnimation = document.getElementById('loading-animation');

        learnMoreButton.addEventListener('click', function (event) {
            event.preventDefault(); // Prevent the default link behavior
            loadingAnimation.style.display = 'block';

            // Simulate a loading delay (you can adjust the delay time)
            setTimeout(() => {
                // Hide the loading animation
                loadingAnimation.style.display = 'none';
                // Redirect to the "learnmore.html" page
                window.location.href = 'learnmore.html';
            }, 3000); // Adjust the time as needed
        });
    </script>
</body>


</html>
