<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Threat Identification</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
        
        <style>
            body {
              background-image: url('{{ url_for('static', filename='fish.jpg') }}');

              background-size: cover;
              background-repeat: no-repeat;
              background-attachment: fixed;
              color: white; /* default color white hai */
            }
                button{
                    width: 200px;
                    padding: 15px;
                    margin: 20px 5px;
                    text-align: center; 
                    border-radius: 25px;
                    color: rgb(237, 187, 130);
                    border: 2px;
                    font-size: 20px;
                    cursor: pointer;
                    font-weight: 600;
                    left: 660px;
}
button:hover{
    background:  black;
    transition: 0.8s;
}
button:hover{
    color: gray;
}
          
            .container.bg-dark h1.jumbotron.bg-primary {
              background-color: purple; 
            }
          
           
            .container.bg-dark h1.jumbotron.bg-primary,
            label,
            button {
              color: white;
            }
            form-horizontal .form-group {
    text-align: center;
    left:250px 
  }


  .form-horizontal .form-group .col-sm-10 {
    text-align: right; 
    margin-top: 10px; 
  }
  .text-center {
        text-align: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
    .text-center button {
        background-color: tomato; /* lal lal tomato*/
    }
          </style>
          
    </head>


    <body>
       
        <div class="container bg-dark">
            <h1 class="jumbotron bg-primary">Threat Identification</h1>
            <br><br>
            <div class="card" , style="width: 100%; height: 100%; margin-top: 10px">
                <div class="card-header" style="text-align: center">
                    <form class="form-horizontal" action="/submit" method="post" enctype="multipart/form-data">
                        <div class="form-group">
                            <label class="control-label col-md-6" for="pwd"><b>     Upload Your Image :</b></label>
                            <div class="col-sm-10">          
                                <input type="file" class="form-control" placeholder="Hours Studied"  name="my_image" id="pwd">
                            </div>
                        </div>        
                </div>
            </div>
            

                <div class="form-group">        
                    <div class="col-sm-offset-2 col-sm-10">
                        <button type="submit" class="btn btn-success">Submit</button>
                    </div>
                </div>
            </form>

                {% if prediction %}
                    <img src= "{{ new_image }}" height="400px" width="400px" alt="test image">
                    <h2> Your Prediction   : <i> {{prediction}} </i></h2>
                {% endif %}

        </div>
        <div class="text-center"> 
            <a href="http://127.0.0.1:5500/website/templates/index1.html" id="learn-more-link"><button type="button">Learn More</button></a>
        </div>
    </body>
</html>
